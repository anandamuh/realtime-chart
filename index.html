<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Bitcoin Price Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #1a1a1a; /* Kita bikin tema dark mode biar keren */
            color: #ffffff;
            padding: 20px;
        }
        .container {
            width: 80%;
            max-width: 700px;
            background: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        h2 { color: #f2a900; } /* Warna khas Bitcoin */
    </style>
</head>
<body>

    <h2>Live Bitcoin (BTC) Price Tracker 🪙</h2>
    <p>Mengambil data harga asli dari pasar kripto via Fetch API</p>

    <div class="container">
        <canvas id="grafikBitcoin"></canvas>
    </div>

    <script>
        const ctx = document.getElementById('grafikBitcoin').getContext('2d');

const konfigurasi = {
    type: 'line', 
    data: {
        labels: [], 
        datasets: [{
            label: 'Harga Bitcoin Real-Time (Binance HTTPS)',
            data: [], 
            borderColor: '#f2a900', 
            backgroundColor: 'rgba(242, 169, 0, 0.1)',
            borderWidth: 2,
            tension: 0.2 
        }]
    },
    options: {
        responsive: true,
        animation: false,
        scales: {
            y: {
                beginAtZero: false 
            }
        }
    }
};

const grafikBTC = new Chart(ctx, konfigurasi);

// MENGGUNAKAN FETCH HTTPS (Sangat Aman & Didukung Penuh Oleh GitHub Pages)
async function ambilHargaBitcoinReal() {
    try {
        // Tembak API Binance jalur HTTPS resmi
        const respon = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
        
        if (!respon.ok) throw new Error("Gagal mengambil data");

        const data = await respon.json();
        const hargaReal = parseFloat(data.price); 
        const waktuSekarang = new Date().toLocaleTimeString();

        // Masukkan data ke grafik
        grafikBTC.data.labels.push(waktuSekarang);
        grafikBTC.data.datasets[0].data.push(hargaReal);

        // Batasi 10 data terakhir
        if (grafikBTC.data.labels.length > 10) {
            grafikBTC.data.labels.shift();
            grafikBTC.data.datasets[0].data.shift();
        }

        grafikBTC.update();
    } catch (error) {
        console.error("Detektif Error:", error);
    }
}

// Ambil data real setiap 3 detik sekali
setInterval(ambilHargaBitcoinReal, 3000);

// Jalankan sekali di awal
ambilHargaBitcoinReal();
    </script>

</body>
</html>
